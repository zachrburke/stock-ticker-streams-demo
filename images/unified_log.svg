<svg width="980" height="430" viewBox="0 0 980 430" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Courier New', monospace; }
    </style>
    <radialGradient id="bg" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#0d1d35"/>
      <stop offset="100%" stop-color="#060b16"/>
    </radialGradient>
    <linearGradient id="cellFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1e36"/>
      <stop offset="100%" stop-color="#081422"/>
    </linearGradient>
    <linearGradient id="lastCellFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2e48"/>
      <stop offset="100%" stop-color="#0e1e32"/>
    </linearGradient>
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d6a8a"/>
    </marker>
    <marker id="arr-cyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#06b6d4"/>
    </marker>
    <marker id="arr-pink" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ec4899"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="980" height="430" fill="url(#bg)"/>

  <!-- Subtle horizontal banding for depth -->
  <rect x="0" y="148" width="980" height="89" fill="#ffffff" opacity="0.012"/>

  <!-- THE UNIFIED LOG title box: shadow first, then main box on top -->
  <rect x="40" y="33" width="172" height="55" rx="4"
        fill="none" stroke="#162d4a" stroke-width="1" stroke-dasharray="3,3" opacity="0.7"/>
  <rect x="35" y="28" width="172" height="55" rx="4"
        fill="#07111f" stroke="#1a3456" stroke-width="1.5"/>
  <text x="121" y="53" text-anchor="middle" font-size="11" font-weight="600"
        fill="#4a7ba8" letter-spacing="1.5">THE UNIFIED</text>
  <text x="121" y="71" text-anchor="middle" font-size="11" font-weight="600"
        fill="#4a7ba8" letter-spacing="1.5">LOG</text>

  <!-- CELLS 00-17: one solid rect with internal dividers -->
  <rect x="35" y="150" width="828" height="85"
        fill="url(#cellFill)" stroke="#162d4a" stroke-width="1.5"/>
  <!-- Dividers at x = 35 + i*46, for i = 1..17 -->
  <line x1="81"  y1="150" x2="81"  y2="235" stroke="#162d4a" stroke-width="1"/>
  <line x1="127" y1="150" x2="127" y2="235" stroke="#162d4a" stroke-width="1"/>
  <line x1="173" y1="150" x2="173" y2="235" stroke="#162d4a" stroke-width="1"/>
  <line x1="219" y1="150" x2="219" y2="235" stroke="#162d4a" stroke-width="1"/>
  <line x1="265" y1="150" x2="265" y2="235" stroke="#162d4a" stroke-width="1"/>
  <line x1="311" y1="150" x2="311" y2="235" stroke="#162d4a" stroke-width="1"/>
  <line x1="357" y1="150" x2="357" y2="235" stroke="#162d4a" stroke-width="1"/>
  <line x1="403" y1="150" x2="403" y2="235" stroke="#162d4a" stroke-width="1"/>
  <line x1="449" y1="150" x2="449" y2="235" stroke="#162d4a" stroke-width="1"/>
  <line x1="495" y1="150" x2="495" y2="235" stroke="#162d4a" stroke-width="1"/>
  <line x1="541" y1="150" x2="541" y2="235" stroke="#162d4a" stroke-width="1"/>
  <line x1="587" y1="150" x2="587" y2="235" stroke="#162d4a" stroke-width="1"/>
  <line x1="633" y1="150" x2="633" y2="235" stroke="#162d4a" stroke-width="1"/>
  <line x1="679" y1="150" x2="679" y2="235" stroke="#162d4a" stroke-width="1"/>
  <line x1="725" y1="150" x2="725" y2="235" stroke="#162d4a" stroke-width="1"/>
  <line x1="771" y1="150" x2="771" y2="235" stroke="#162d4a" stroke-width="1"/>
  <line x1="817" y1="150" x2="817" y2="235" stroke="#162d4a" stroke-width="1"/>

  <!-- CELL 18: dashed border, slightly lighter fill -->
  <rect x="863" y="150" width="46" height="85"
        fill="url(#lastCellFill)" stroke="#274868" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Cell numbers: center_x = 58 + i*46, text y = 197 -->
  <text x="58"  y="197" text-anchor="middle" font-size="13" fill="#2e6090">00</text>
  <text x="104" y="197" text-anchor="middle" font-size="13" fill="#2e6090">01</text>
  <text x="150" y="197" text-anchor="middle" font-size="13" fill="#2e6090">02</text>
  <text x="196" y="197" text-anchor="middle" font-size="13" fill="#2e6090">03</text>
  <text x="242" y="197" text-anchor="middle" font-size="13" fill="#2e6090">04</text>
  <text x="288" y="197" text-anchor="middle" font-size="13" fill="#2e6090">05</text>
  <text x="334" y="197" text-anchor="middle" font-size="13" fill="#2e6090">06</text>
  <text x="380" y="197" text-anchor="middle" font-size="13" fill="#2e6090">07</text>
  <text x="426" y="197" text-anchor="middle" font-size="13" fill="#2e6090">08</text>
  <text x="472" y="197" text-anchor="middle" font-size="13" fill="#2e6090">09</text>
  <text x="518" y="197" text-anchor="middle" font-size="13" fill="#2e6090">10</text>
  <text x="564" y="197" text-anchor="middle" font-size="13" fill="#2e6090">11</text>
  <text x="610" y="197" text-anchor="middle" font-size="13" fill="#2e6090">12</text>
  <text x="656" y="197" text-anchor="middle" font-size="13" fill="#2e6090">13</text>
  <text x="702" y="197" text-anchor="middle" font-size="13" fill="#2e6090">14</text>
  <text x="748" y="197" text-anchor="middle" font-size="13" fill="#2e6090">15</text>
  <text x="794" y="197" text-anchor="middle" font-size="13" fill="#2e6090">16</text>
  <text x="840" y="197" text-anchor="middle" font-size="13" fill="#2e6090">17</text>
  <text x="886" y="197" text-anchor="middle" font-size="13" fill="#2e6090">18</text>

  <!-- PRODUCER ARROW: L-shaped path into cell 18 -->
  <text x="760" y="48" text-anchor="end" font-size="11" fill="#3d6a8a">producer</text>
  <text x="760" y="64" text-anchor="end" font-size="11" fill="#3d6a8a">emitting</text>
  <text x="760" y="80" text-anchor="end" font-size="11" fill="#3d6a8a">records</text>
  <line x1="762" y1="64" x2="886" y2="64" stroke="#3d6a8a" stroke-width="1.5"/>
  <line x1="886" y1="64" x2="886" y2="143" stroke="#3d6a8a" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <!-- CONSUMER 1 — cyan, at x=311 (left edge of cell 06) -->
  <!-- Glow layer -->
  <line x1="311" y1="335" x2="311" y2="240" stroke="#06b6d4" stroke-width="7" opacity="0.12"/>
  <!-- Main upward arrow -->
  <line x1="311" y1="335" x2="311" y2="244" stroke="#06b6d4" stroke-width="2" marker-end="url(#arr-cyan)"/>
  <!-- Labels -->
  <text x="323" y="298" font-size="11" fill="#06b6d4">consumer1</text>
  <text x="323" y="314" font-size="11" fill="#06b6d4">position</text>

  <!-- CONSUMER 2 — pink, at x=771 (between cells 15 and 16) -->
  <!-- Glow layer -->
  <line x1="771" y1="305" x2="771" y2="240" stroke="#ec4899" stroke-width="7" opacity="0.12"/>
  <!-- Main upward arrow -->
  <line x1="771" y1="305" x2="771" y2="244" stroke="#ec4899" stroke-width="2" marker-end="url(#arr-pink)"/>
  <!-- Labels -->
  <text x="783" y="277" font-size="11" fill="#ec4899">consumer2</text>
  <text x="783" y="293" font-size="11" fill="#ec4899">position</text>

  <!-- NEXT RECORD — at x=909 (right edge of cell 18) -->
  <line x1="909" y1="305" x2="909" y2="244" stroke="#3d6a8a" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <text x="921" y="272" font-size="11" fill="#3d6a8a">next</text>
  <text x="921" y="288" font-size="11" fill="#3d6a8a">record</text>

  <!-- ELIGIBLE FOR TRUNCATION -->
  <!-- Vertical connector from consumer1 arrow base down to truncation line -->
  <line x1="311" y1="335" x2="311" y2="378" stroke="#1e3d5c" stroke-width="1.5"/>
  <!-- Horizontal leftward arrow -->
  <line x1="311" y1="378" x2="44"  y2="378" stroke="#3d6a8a" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <!-- Label sits just above the arrow -->
  <text x="177" y="366" text-anchor="middle" font-size="11" fill="#3d6a8a">eligible for truncation</text>
</svg>
